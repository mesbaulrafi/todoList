<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <div class="todo-card">
            <header class="todo-header">
                <h2>My Tasks</h2>
                <p class="subtitle">Keep track of your daily goals</p>
            </header>
            <div class="input-section">
                <input type="text" id="todoInput" class="task-input" placeholder="What needs to be done?">
                <button onclick="addTask()" class="add-btn">Add</button>
            </div>
            <ul id="todoList" class="task-list">
            </ul>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
